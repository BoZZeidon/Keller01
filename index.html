<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Materialkeller</title>
<meta name="theme-color" content="#2C342C">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Stencil+One&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
:root{
  --oliv:#2C342C; --oliv-hell:#4A5743; --papier:#EFF1E9; --karte:#FFFFFF;
  --tinte:#161A14; --grau:#6B7264; --linie:#D6DACB;
  --warn:#B3541E; --leer:#9A2C2C;
  --mono:"IBM Plex Mono",ui-monospace,Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:var(--papier);color:var(--tinte);
  -webkit-tap-highlight-color:transparent}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font:inherit}

/* ---------- Kopf ---------- */
header{position:sticky;top:0;z-index:20;background:var(--oliv);color:#EFF1E9;
  padding:calc(env(safe-area-inset-top) + 12px) 16px 12px}
.titel{font-family:"Saira Stencil One",sans-serif;font-size:22px;letter-spacing:.14em;text-transform:uppercase}
.titel small{font-family:var(--mono);font-size:10px;letter-spacing:.2em;display:block;opacity:.65;margin-top:2px}
.suche{margin-top:10px;display:flex;gap:8px}
.suche input{flex:1;border:none;border-radius:8px;padding:10px 14px;font-size:16px;background:#EFF1E9;color:var(--tinte)}
.suche input::placeholder{color:var(--grau)}

/* ---------- Liste ---------- */
main{padding:12px 12px calc(env(safe-area-inset-bottom) + 86px);max-width:680px;margin:0 auto}
.zeile{display:flex;align-items:center;gap:12px;background:var(--karte);border:1px solid var(--linie);
  border-radius:10px;padding:12px 14px;margin-bottom:8px;width:100%;text-align:left}
.zeile:active{background:#F6F7F1}
.z-info{flex:1;min-width:0}
.z-name{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.z-meta{font-family:var(--mono);font-size:12px;color:var(--grau);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.kiste{font-family:var(--mono);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
  border:1.5px solid var(--oliv-hell);color:var(--oliv);border-radius:4px;padding:3px 8px;white-space:nowrap}
.menge{font-family:var(--mono);font-size:15px;font-weight:600;min-width:44px;text-align:right}
.menge.null{color:var(--leer)}
.hinweis{text-align:center;color:var(--grau);padding:48px 24px;line-height:1.6}
.hinweis b{color:var(--tinte)}

/* ---------- Untere Leiste ---------- */
nav{position:fixed;left:0;right:0;bottom:0;z-index:20;background:var(--oliv);
  padding:10px 12px calc(env(safe-area-inset-bottom) + 10px);display:flex;gap:10px;justify-content:center}
nav button{border-radius:10px;padding:12px 0;font-size:14px;font-weight:600;flex:1;max-width:200px;color:#EFF1E9;background:var(--oliv-hell)}
nav button.primaer{background:#EFF1E9;color:var(--oliv);flex:1.4}
nav button:active{opacity:.85}

/* ---------- Detail / Formular / Sheets ---------- */
.blatt{position:fixed;inset:0;z-index:30;background:var(--papier);overflow-y:auto;display:none}
.blatt.offen{display:block}
.blatt-kopf{position:sticky;top:0;background:var(--oliv);color:#EFF1E9;display:flex;align-items:center;gap:8px;
  padding:calc(env(safe-area-inset-top) + 10px) 12px 10px}
.blatt-kopf h2{font-size:17px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.blatt-kopf button{font-size:15px;font-weight:600;padding:8px 12px;border-radius:8px;background:var(--oliv-hell)}
.blatt-inhalt{padding:16px;max-width:680px;margin:0 auto;padding-bottom:48px}

.feldkarte{background:var(--karte);border:1px solid var(--linie);border-radius:10px;overflow:hidden;margin-bottom:14px}
.feld{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:13px 14px;border-bottom:1px solid var(--linie)}
.feld:last-child{border-bottom:none}
.feld dt{font-size:12px;color:var(--grau);text-transform:uppercase;letter-spacing:.08em}
.feld dd{font-family:var(--mono);font-size:15px;text-align:right;word-break:break-all}
.feld dd.gross{font-size:17px;font-weight:600}

.mengensteller{display:flex;align-items:center;justify-content:center;gap:18px;background:var(--karte);
  border:1px solid var(--linie);border-radius:10px;padding:14px;margin-bottom:14px}
.mengensteller button{width:56px;height:56px;border-radius:50%;background:var(--oliv);color:#EFF1E9;font-size:26px;font-weight:600}
.mengensteller .wert{font-family:var(--mono);font-size:32px;font-weight:600;min-width:88px;text-align:center}
.mengensteller .wert.null{color:var(--leer)}

.qrbox{display:flex;justify-content:center;padding:18px;background:var(--karte);border:1px solid var(--linie);border-radius:10px;margin-bottom:14px}
.qrbox img{width:180px;height:180px;image-rendering:pixelated}

.aktionen{display:grid;gap:10px}
.knopf{display:block;width:100%;text-align:center;border-radius:10px;padding:14px;font-size:15px;font-weight:600;
  background:var(--oliv);color:#EFF1E9;text-decoration:none}
.knopf.neben{background:var(--karte);color:var(--oliv);border:1.5px solid var(--oliv-hell)}
.knopf.gefahr{background:transparent;color:var(--leer);border:1.5px solid var(--leer)}
.knopf:active{opacity:.85}

label.fl{display:block;font-size:12px;color:var(--grau);text-transform:uppercase;letter-spacing:.08em;margin:14px 0 6px}
.blatt-inhalt input,.blatt-inhalt textarea{width:100%;border:1px solid var(--linie);border-radius:8px;
  padding:12px;font-size:16px;background:var(--karte)}
.blatt-inhalt input:focus,.blatt-inhalt textarea:focus{outline:2px solid var(--oliv-hell)}

/* ---------- Scanner ---------- */
#scanFenster{max-width:480px;margin:24px auto;border-radius:12px;overflow:hidden;background:#000}
.scan-tipp{text-align:center;color:var(--grau);font-size:13px;margin-top:14px}

/* ---------- Etiketten-Auswahl ---------- */
.wahl{display:flex;align-items:center;gap:12px;background:var(--karte);border:1px solid var(--linie);
  border-radius:10px;padding:12px 14px;margin-bottom:8px}
.wahl input{width:22px;height:22px;accent-color:var(--oliv)}
.wahl .z-info{flex:1;min-width:0}

/* ---------- Mehr-Menü ---------- */
.menue{position:fixed;inset:0;z-index:40;background:rgba(22,26,20,.45);display:none;align-items:flex-end;justify-content:center}
.menue.offen{display:flex}
.menue-karte{background:var(--papier);border-radius:14px 14px 0 0;width:100%;max-width:680px;
  padding:16px 16px calc(env(safe-area-inset-bottom) + 20px)}
.menue-karte .knopf{margin-bottom:10px}

.toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%);z-index:50;background:var(--tinte);
  color:#EFF1E9;padding:10px 18px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw;text-align:center}
.toast.zeigen{opacity:1}
@media (prefers-reduced-motion:reduce){.toast{transition:none}}
</style>
</head>
<body>

<header>
  <div class="titel">Materialkeller<small>Bestandsverwaltung · 2./SanRgt 2</small></div>
  <div class="suche">
    <input id="suchfeld" type="search" placeholder="Suchen: Name, Nummer, Kiste, REF …" autocomplete="off">
  </div>
</header>

<main id="liste"></main>

<nav>
  <button onclick="oeffneScanner()" class="primaer">⌖ Scannen</button>
  <button onclick="oeffneFormular()">+ Neu</button>
  <button onclick="zeigeMenue(true)">⋯ Mehr</button>
</nav>

<!-- Artikel-Detail -->
<section class="blatt" id="detail">
  <div class="blatt-kopf">
    <button onclick="schliesseAlles()">‹ Zurück</button>
    <h2 id="d-titel"></h2>
    <button onclick="bearbeiteAktuellen()">Bearbeiten</button>
  </div>
  <div class="blatt-inhalt" id="d-inhalt"></div>
</section>

<!-- Formular Neu/Bearbeiten -->
<section class="blatt" id="formular">
  <div class="blatt-kopf">
    <button onclick="schliesseFormular()">Abbrechen</button>
    <h2 id="f-titel">Neuer Artikel</h2>
    <button onclick="speichereArtikel()">Speichern</button>
  </div>
  <div class="blatt-inhalt">
    <label class="fl" for="f-name">Artikelname *</label>
    <input id="f-name" placeholder="z. B. Verbandpäckchen DIN 13151-M">
    <label class="fl" for="f-nummer">Artikelnummer</label>
    <input id="f-nummer" placeholder="z. B. 6510-12-345-6789">
    <label class="fl" for="f-kiste">Kiste / Lagerort</label>
    <input id="f-kiste" placeholder="z. B. K-07">
    <label class="fl" for="f-menge">Menge</label>
    <input id="f-menge" type="number" inputmode="numeric" min="0" value="0">
    <label class="fl" for="f-ref">REF-Nr</label>
    <input id="f-ref" placeholder="z. B. REF 123456">
    <label class="fl" for="f-notiz">Notiz</label>
    <textarea id="f-notiz" rows="3" placeholder="Optional, z. B. Verfallsdatum, Zustand"></textarea>
  </div>
</section>

<!-- Scanner -->
<section class="blatt" id="scanner">
  <div class="blatt-kopf">
    <button onclick="schliesseScanner()">‹ Zurück</button>
    <h2>QR-Code scannen</h2>
  </div>
  <div class="blatt-inhalt">
    <div id="scanFenster"></div>
    <p class="scan-tipp">Etikett ruhig vor die Kamera halten – der Artikel öffnet sich automatisch.</p>
  </div>
</section>

<!-- Etiketten-Auswahl -->
<section class="blatt" id="etiketten">
  <div class="blatt-kopf">
    <button onclick="schliesseAlles()">‹ Zurück</button>
    <h2>Etiketten drucken</h2>
    <button onclick="alleWaehlen()">Alle</button>
  </div>
  <div class="blatt-inhalt">
    <div id="e-liste"></div>
    <div class="aktionen" style="margin-top:14px">
      <button class="knopf" onclick="erstelleEtikettenPdf()">PDF erstellen</button>
    </div>
  </div>
</section>

<!-- Mehr-Menü -->
<div class="menue" id="menue" onclick="if(event.target===this)zeigeMenue(false)">
  <div class="menue-karte">
    <a class="knopf" href="/api/export.xlsx">⬇ Excel-Bestand herunterladen</a>
    <button class="knopf neben" onclick="zeigeMenue(false);oeffneEtiketten()">⬚ QR-Etiketten als PDF</button>
    <button class="knopf neben" onclick="document.getElementById('importDatei').click()">⬆ Excel importieren</button>
    <button class="knopf gefahr" onclick="zeigeMenue(false)">Schließen</button>
  </div>
</div>
<input type="file" id="importDatei" accept=".xlsx" hidden onchange="importiereExcel(this.files[0])">

<div class="toast" id="toast"></div>

<script>
/* ================= ZUSTAND ================= */
let artikelListe = [];
let aktuellerArtikel = null;
let scannerInstanz = null;

const $ = (id) => document.getElementById(id);
const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function toast(text){
  const t = $("toast"); t.textContent = text; t.classList.add("zeigen");
  clearTimeout(t._timer); t._timer = setTimeout(() => t.classList.remove("zeigen"), 2600);
}

async function api(pfad, optionen){
  const r = await fetch(pfad, optionen);
  const daten = await r.json().catch(() => ({}));
  if(!r.ok) throw new Error(daten.fehler || "Serverfehler");
  return daten;
}

/* ================= LISTE & SUCHE ================= */
async function ladeListe(){
  const q = $("suchfeld").value.trim();
  artikelListe = await api("/api/artikel" + (q ? "?q=" + encodeURIComponent(q) : ""));
  const ziel = $("liste");
  if(!artikelListe.length){
    ziel.innerHTML = q
      ? `<div class="hinweis">Kein Treffer für <b>${esc(q)}</b>.<br>Suche prüfen oder Artikel neu anlegen.</div>`
      : `<div class="hinweis"><b>Noch keine Artikel erfasst.</b><br>Unten auf <b>+ Neu</b> tippen oder über <b>⋯ Mehr</b> eine Excel-Liste importieren.</div>`;
    return;
  }
  ziel.innerHTML = artikelListe.map(a => `
    <button class="zeile" onclick="location.hash='a=${a.id}'">
      <div class="z-info">
        <div class="z-name">${esc(a.name)}</div>
        <div class="z-meta">${esc(a.nummer || "–")}${a.ref ? " · REF " + esc(a.ref) : ""}</div>
      </div>
      <span class="kiste">${esc(a.kiste || "?")}</span>
      <span class="menge ${a.menge ? "" : "null"}">${a.menge}×</span>
    </button>`).join("");
}
let suchTimer;
$("suchfeld").addEventListener("input", () => {
  clearTimeout(suchTimer); suchTimer = setTimeout(ladeListe, 250);
});

/* ================= DETAIL ================= */
async function oeffneDetail(id){
  try{ aktuellerArtikel = await api("/api/artikel/" + id); }
  catch(e){ toast("Artikel nicht gefunden"); location.hash = ""; return; }
  const a = aktuellerArtikel;
  $("d-titel").textContent = a.name;
  $("d-inhalt").innerHTML = `
    <div class="mengensteller">
      <button onclick="aendereMenge(-1)" aria-label="Menge verringern">−</button>
      <div class="wert ${a.menge ? "" : "null"}" id="d-menge">${a.menge}</div>
      <button onclick="aendereMenge(1)" aria-label="Menge erhöhen">+</button>
    </div>
    <dl class="feldkarte">
      <div class="feld"><dt>Artikelnummer</dt><dd class="gross">${esc(a.nummer || "–")}</dd></div>
      <div class="feld"><dt>Kiste</dt><dd class="gross">${esc(a.kiste || "–")}</dd></div>
      <div class="feld"><dt>REF-Nr</dt><dd>${esc(a.ref || "–")}</dd></div>
      ${a.notiz ? `<div class="feld"><dt>Notiz</dt><dd style="font-family:inherit">${esc(a.notiz)}</dd></div>` : ""}
      <div class="feld"><dt>Geändert</dt><dd>${a.geaendert ? new Date(a.geaendert).toLocaleString("de-DE") : "–"}</dd></div>
    </dl>
    <div class="aktionen">
      <a class="knopf" href="/api/labels.pdf?ids=${a.id}">⬚ Etikett als PDF</a>
      <button class="knopf gefahr" onclick="loescheArtikel()">Artikel löschen</button>
    </div>`;
  $("detail").classList.add("offen");
}

async function aendereMenge(delta){
  if(!aktuellerArtikel) return;
  try{
    aktuellerArtikel = await api(`/api/artikel/${aktuellerArtikel.id}/menge`, {
      method:"PATCH", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ delta })
    });
    const w = $("d-menge");
    w.textContent = aktuellerArtikel.menge;
    w.classList.toggle("null", !aktuellerArtikel.menge);
  }catch(e){ toast(e.message); }
}

async function loescheArtikel(){
  if(!aktuellerArtikel) return;
  if(!confirm(`„${aktuellerArtikel.name}" wirklich löschen?`)) return;
  await api("/api/artikel/" + aktuellerArtikel.id, { method:"DELETE" });
  toast("Artikel gelöscht");
  location.hash = ""; schliesseAlles(); ladeListe();
}

/* ================= FORMULAR ================= */
function oeffneFormular(a){
  $("f-titel").textContent = a ? "Artikel bearbeiten" : "Neuer Artikel";
  $("f-name").value   = a?.name   || "";
  $("f-nummer").value = a?.nummer || "";
  $("f-kiste").value  = a?.kiste  || "";
  $("f-menge").value  = a?.menge  ?? 0;
  $("f-ref").value    = a?.ref    || "";
  $("f-notiz").value  = a?.notiz  || "";
  $("formular").dataset.id = a?.id || "";
  $("formular").classList.add("offen");
  if(!a) setTimeout(() => $("f-name").focus(), 50);
}
function bearbeiteAktuellen(){ if(aktuellerArtikel) oeffneFormular(aktuellerArtikel); }
function schliesseFormular(){ $("formular").classList.remove("offen"); }

async function speichereArtikel(){
  const id = $("formular").dataset.id;
  const daten = {
    name: $("f-name").value, nummer: $("f-nummer").value,
    kiste: $("f-kiste").value, menge: $("f-menge").value,
    ref: $("f-ref").value, notiz: $("f-notiz").value,
  };
  if(!daten.name.trim()) return toast("Artikelname fehlt");
  try{
    const a = await api("/api/artikel" + (id ? "/" + id : ""), {
      method: id ? "PUT" : "POST",
      headers:{"Content-Type":"application/json"}, body: JSON.stringify(daten)
    });
    schliesseFormular(); toast("Gespeichert");
    ladeListe();
    location.hash = "a=" + a.id;
    if($("detail").classList.contains("offen")) oeffneDetail(a.id);
  }catch(e){ toast(e.message); }
}

/* ================= SCANNER ================= */
function oeffneScanner(){
  $("scanner").classList.add("offen");
  scannerInstanz = new Html5Qrcode("scanFenster");
  scannerInstanz.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 230, height: 230 } },
    (text) => {
      const m = text.match(/#a=(\d+)/) || text.match(/^(\d+)$/);
      if(m){
        schliesseScanner();
        location.hash = "a=" + m[1];
      } else {
        toast("Kein Materialkeller-Code");
      }
    },
    () => {}
  ).catch(() => {
    toast("Kamera nicht verfügbar – Berechtigung prüfen");
    schliesseScanner();
  });
}
function schliesseScanner(){
  $("scanner").classList.remove("offen");
  if(scannerInstanz){
    scannerInstanz.stop().then(() => scannerInstanz.clear()).catch(() => {});
    scannerInstanz = null;
  }
}

/* ================= ETIKETTEN ================= */
async function oeffneEtiketten(){
  const alle = await api("/api/artikel");
  $("e-liste").innerHTML = alle.length ? alle.map(a => `
    <label class="wahl">
      <input type="checkbox" value="${a.id}">
      <div class="z-info">
        <div class="z-name">${esc(a.name)}</div>
        <div class="z-meta">${esc(a.nummer || "–")} · Kiste ${esc(a.kiste || "?")}</div>
      </div>
    </label>`).join("")
    : `<div class="hinweis">Keine Artikel vorhanden – erst Artikel anlegen.</div>`;
  $("etiketten").classList.add("offen");
}
function alleWaehlen(){
  const boxen = document.querySelectorAll("#e-liste input");
  const alleAn = [...boxen].every(b => b.checked);
  boxen.forEach(b => b.checked = !alleAn);
}
function erstelleEtikettenPdf(){
  const ids = [...document.querySelectorAll("#e-liste input:checked")].map(b => b.value);
  if(!ids.length) return toast("Mindestens einen Artikel auswählen");
  window.open("/api/labels.pdf?ids=" + ids.join(","), "_blank");
}

/* ================= IMPORT ================= */
async function importiereExcel(datei){
  if(!datei) return;
  zeigeMenue(false);
  toast("Import läuft …");
  try{
    const r = await fetch("/api/import", {
      method:"POST",
      headers:{"Content-Type":"application/octet-stream"},
      body: datei
    });
    const d = await r.json();
    if(!r.ok) throw new Error(d.fehler || "Import fehlgeschlagen");
    toast(`${d.importiert} Artikel importiert`);
    ladeListe();
  }catch(e){ toast(e.message); }
  $("importDatei").value = "";
}

/* ================= NAVIGATION ================= */
function zeigeMenue(an){ $("menue").classList.toggle("offen", an); }
function schliesseAlles(){
  ["detail","etiketten"].forEach(id => $(id).classList.remove("offen"));
  if(location.hash) history.replaceState(null, "", location.pathname);
}
function pruefeHash(){
  const m = location.hash.match(/#a=(\d+)/);
  if(m) oeffneDetail(m[1]);
  else { $("detail").classList.remove("offen"); aktuellerArtikel = null; }
}
window.addEventListener("hashchange", pruefeHash);

ladeListe().then(pruefeHash);
</script>
</body>
</html>
